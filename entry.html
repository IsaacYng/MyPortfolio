<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Poem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 flex justify-center">
    <div class="max-w-lg w-full bg-white p-8 rounded-2xl shadow-md">
        <h2 class="text-2xl font-bold mb-4 text-center">New Poem Entry</h2>
        <input type="text" id="t" placeholder="Title" class="w-full p-3 mb-4 bg-gray-50 border rounded">
        <textarea id="c" rows="6" placeholder="Poem Content" class="w-full p-3 mb-4 bg-gray-50 border rounded"></textarea>
        <button id="s" class="w-full bg-black text-white py-3 rounded font-bold uppercase">Publish Now</button>
        <p id="msg" class="mt-4 text-center text-sm"></p>
    </div>
    <script type="module" src="entry.js"></script>
</body>
</html>
