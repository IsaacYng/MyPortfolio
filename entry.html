<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Admin Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-center">Add New Poem</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold uppercase text-gray-400">Poem Title</label>
                <input type="text" id="poemTitle" placeholder="Enter title..." 
                       class="w-full p-4 mt-1 bg-gray-50 rounded-xl outline-none focus:ring-1 focus:ring-black transition">
            </div>

            <div>
                <label class="text-xs font-bold uppercase text-gray-400">Poem Content</label>
                <textarea id="poemBody" rows="8" placeholder="Write your poem here..." 
                          class="w-full p-4 mt-1 bg-gray-50 rounded-xl outline-none focus:ring-1 focus:ring-black transition"></textarea>
            </div>

            <button id="saveBtn" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-gray-800 transition">
                Publish Poem
            </button>
        </div>

        <div id="status" class="mt-4 text-center text-sm font-medium"></div>
        
        <div class="mt-8 text-center">
            <a href="poem.html" class="text-xs text-gray-400 hover:text-black uppercase tracking-widest">← View Poetry Page</a>
        </div>
    </div>

    <script type="module" src="entry.js"></script>
</body>
</html>
